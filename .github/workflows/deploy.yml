name: Deploy MinedDeep to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allow manual re-deploy from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so git-date frontmatter works
          submodules: true        # pull quartz-src submodule

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── Install Quartz ──────────────────────────────────────────────────────
      # We keep Quartz as a submodule OR install via npx.
      # This workflow uses the submodule approach (recommended for config control).
      # See QUARTZ_SETUP.md for the one-time git submodule init step.
      - name: Install Quartz dependencies
        run: npm ci
        working-directory: ./quartz-src   # submodule path (see QUARTZ_SETUP.md)

      # ── Link custom config files into submodule ────────────────────────────
      # Quartz reads quartz.config.ts and quartz.layout.ts from its own directory.
      # We store our custom versions in the repo root and symlink them in.
      - name: Link custom config into submodule
        run: |
          rm -f quartz-src/quartz.config.ts quartz-src/quartz.layout.ts
          ln -sf ../quartz.config.ts quartz-src/quartz.config.ts
          ln -sf ../quartz.layout.ts  quartz-src/quartz.layout.ts

      # ── Inject Fathom analytics into Head component ────────────────────────
      - name: Patch Fathom analytics into Head.tsx
        run: |
          sed -i 's|</head>|<script src="https://cdn.usefathom.com/script.js" data-site="YDETFBMD" defer></script>\n      </head>|' quartz-src/quartz/components/Head.tsx

      # ── Rename entry point ─────────────────────────────────────────────────
      # Quartz expects index.md, not _index.md, as the home page.
      # This step does the rename at build time so you don't have to touch your files.
      - name: Normalise home page filename
        run: |
          if [ -f wiki/_index.md ] && [ ! -f wiki/index.md ]; then
            cp wiki/_index.md wiki/index.md
          fi

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build Quartz site
        run: |
          npx quartz build \
            --directory ../wiki \
            --output ../public
        working-directory: ./quartz-src

      # ── Upload artifact for Pages ──────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
